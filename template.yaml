AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Users + Groups + Secret Password Automation

Resources:

  UserBoundaryPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: UserStandardBoundary
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - ec2:DescribeInstances
              - ec2:DescribeImages
              - ec2:DescribeKeyPairs
              - s3:ListAllMyBuckets
              - s3:ListBucket
            Resource: "*"


  ### ---------------------------
  ### Secrets Manager Password
  ### ---------------------------
  PasswordSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: iam-temp-password
      GenerateSecretString:
        SecretStringTemplate: '{}'
        GenerateStringKey: password
        PasswordLength: 12
        ExcludeCharacters: '"@/\\'

  ### ---------------------------
  ### IAM Groups
  ### ---------------------------
  S3Group:
    Type: AWS::IAM::Group
    Properties:
      GroupName: S3Group
      Policies:
        - PolicyName: S3ListPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:ListAllMyBuckets
                  - s3:ListBucket
                Resource: "*"

  EC2Group:
    Type: AWS::IAM::Group
    Properties:
      GroupName: EC2Group
      Policies:
        - PolicyName: EC2Policy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ec2:DescribeInstances
                  - ec2:RunInstances
                  - ec2:DescribeImages
                  - ec2:DescribeKeyPairs
                Resource: "*"

  ### ---------------------------
  ### IAM Users
  ### ---------------------------
  EC2User1:
    Type: AWS::IAM::User
    Properties:
      UserName: ec2-user1-temp
      Groups:
        - !Ref EC2Group
      LoginProfile:
        Password: !Sub '{{resolve:secretsmanager:${PasswordSecret}:SecretString:password}}'
        PasswordResetRequired: true

  EC2User2:
    Type: AWS::IAM::User
    Properties:
      UserName: ec2-user2-temp
      Groups:
        - !Ref EC2Group
      PermissionsBoundary: !Ref UserBoundaryPolicy
      LoginProfile:
        Password: !Sub '{{resolve:secretsmanager:${PasswordSecret}:SecretString:password}}'
        PasswordResetRequired: true

  S3User:
    Type: AWS::IAM::User
    Properties:
      UserName: s3-user-temp
      Groups:
        - !Ref S3Group
      LoginProfile:
        Password: !Sub '{{resolve:secretsmanager:${PasswordSecret}:SecretString:password}}'
        PasswordResetRequired: true
